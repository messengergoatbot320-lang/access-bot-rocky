<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCKY CHOWDHURY - Your Income Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #050505;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* Cyber Security Animation Background */
    .cyber-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.4) 0%, transparent 50%),
        #0a0a0a;
      z-index: -2;
      animation: cyberPulse 25s ease-in-out infinite;
    }
    @keyframes cyberPulse {
      0%, 100% { opacity: 0.85; transform: scale(1.02); }
      50% { opacity: 1; transform: scale(1); }
    }
    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(59,130,246,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.15) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      animation: gridMove 40s linear infinite;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 150px 150px; }
    }
    .neon-title {
      text-shadow: 0 0 20px #3b82f6, 0 0 40px #a855f7, 0 0 60px #22d3ee;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 20px #3b82f6, 0 0 40px #a855f7; }
      to { text-shadow: 0 0 30px #3b82f6, 0 0 60px #a855f7, 0 0 80px #22d3ee; }
    }
    .glass { 
      background: rgba(255,255,255,0.07); 
      backdrop-filter: blur(18px); 
      border: 1px solid rgba(255,255,255,0.18);
    }
  </style>
</head>
<body class="relative">

  <!-- Cyber Security Background -->
  <div class="cyber-bg"></div>
  <div class="grid-bg"></div>

  <!-- Header -->
  <header class="relative z-50 bg-black/80 backdrop-blur-2xl border-b border-white/10 p-5 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 via-blue-600 to-purple-600 rounded-3xl flex items-center justify-center text-4xl font-bold neon-title shadow-2xl">RC</div>
      <div>
        <h1 class="text-4xl font-bold neon-title tracking-tighter">ROCKY CHOWDHURY</h1>
        <p class="text-emerald-400 text-lg font-medium flex items-center gap-2">
          <span class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></span>
          YOUR INCOME BOT READY
        </p>
      </div>
    </div>
    <button onclick="showAdminPanel()" 
            class="flex items-center gap-3 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 px-8 py-3.5 rounded-3xl font-semibold transition-all">
      <i class="fas fa-crown"></i> Admin Panel
    </button>
  </header>

  <div class="max-w-md mx-auto p-6 relative z-10">

    <!-- Balance Card -->
    <div class="glass rounded-3xl p-8 mb-8 text-center border border-white/10">
      <p class="text-zinc-400 text-sm">আপনার ব্যালেন্স</p>
      <h2 class="text-6xl font-black tracking-tighter mt-3">০ <span class="text-4xl">TK</span></h2>
      <div class="flex gap-4 mt-10">
        <button onclick="sendQuick('.buy')" 
          class="flex-1 bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-zinc-100 transition">
          <i class="fas fa-shopping-cart"></i> Buy Package
        </button>
        <button onclick="sendQuick('.recharge')" 
          class="flex-1 bg-emerald-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-emerald-600 transition">
          <i class="fas fa-coins"></i> Recharge
        </button>
      </div>
    </div>

    <!-- Quick Commands -->
    <div class="grid grid-cols-3 gap-3 mb-10 text-sm">
      <button onclick="sendQuick('.start')" class="glass py-4 rounded-2xl font-medium active:scale-95">.start</button>
      <button onclick="sendQuick('.balance')" class="glass py-4 rounded-2xl font-medium active:scale-95">.balance</button>
      <button onclick="sendQuick('.help')" class="glass py-4 rounded-2xl font-medium active:scale-95">.help</button>
      <button onclick="sendQuick('.buy')" class="glass py-4 rounded-2xl font-medium active:scale-95">.buy</button>
      <button onclick="sendQuick('.recharge')" class="glass py-4 rounded-2xl font-medium active:scale-95">.recharge</button>
      <button onclick="sendQuick('.support')" class="glass py-4 rounded-2xl font-medium active:scale-95">.support</button>
      <button onclick="sendQuick('.reseller')" class="glass py-4 rounded-2xl font-medium col-span-3">.reseller</button>
    </div>

    <!-- Live Chat -->
    <div class="glass rounded-3xl overflow-hidden border border-white/10">
      <div class="bg-black/70 px-6 py-5 flex items-center gap-4 border-b border-white/10">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-3xl flex items-center justify-center text-3xl">🤖</div>
        <div class="flex-1">
          <p class="font-semibold text-lg">Access Bot Rocky</p>
          <p class="text-xs text-zinc-400">Type message or .command • bby / bot for human-like reply</p>
        </div>
      </div>

      <div id="chat-window" class="h-[400px] p-6 overflow-y-auto space-y-5"></div>

      <div class="p-5 border-t border-white/10 bg-black/70">
        <div class="flex gap-3">
          <input id="chat-input" 
                 type="text" 
                 placeholder="Type here... (bby, .start, anything)"
                 class="flex-1 bg-zinc-900 border border-white/20 focus:border-cyan-400 outline-none px-6 py-4 rounded-3xl text-sm placeholder-zinc-400"
                 onkeydown="if(event.key === 'Enter') sendMessage()">
          <button onclick="sendMessage()" 
                  class="bg-gradient-to-br from-emerald-500 to-cyan-400 w-14 h-14 rounded-3xl flex items-center justify-center hover:scale-110 transition">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-zinc-500 mt-8">ROCKY CHOWDHURY • Premium Income & VPN Bot • Cyber Secure</p>
  </div>

  <!-- Admin Panel -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
    <div class="glass rounded-3xl w-full max-w-md mx-4 overflow-hidden">
      <div class="p-6 border-b flex justify-between">
        <h3 class="font-bold text-xl">👑 Admin Panel - Rocky Chowdhury</h3>
        <i onclick="hideAdminPanel()" class="fas fa-times text-2xl cursor-pointer"></i>
      </div>
      <div id="admin-log" class="p-6 max-h-96 overflow-y-auto"></div>
    </div>
  </div>

  <script>
    // ==================== CONFIG ====================
    const BOT_TOKEN = "8558577029:AAEdOiNQUk7oK2OpnyqtGmU_PVHKWEcKzRs";
    const ADMIN_UID = 6882953267;
    const MAIN_OWNER = "Rocky Chowdhury";
    // ===============================================

    let adminActivity = [];

    function addMessage(text, isUser) {
      const chat = document.getElementById('chat-window');
      const bubble = document.createElement('div');
      bubble.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

      if (isUser) {
        bubble.innerHTML = `<div class="bg-emerald-500 text-black px-5 py-3.5 rounded-3xl max-w-[78%]">${text}</div>`;
      } else {
        bubble.innerHTML = `
          <div class="flex gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-2xl mt-1">🤖</div>
            <div class="bg-zinc-800 px-5 py-3.5 rounded-3xl max-w-[78%]">${text}</div>
          </div>`;
      }
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    function getBotReply(msg) {
      const lower = msg.toLowerCase().trim();

      if (lower === '.start') return `👑 Welcome to ROCKY CHOWDHURY Income Bot!\nMain Owner: ${MAIN_OWNER}\nBalance: 0 TK\nType .help`;
      if (lower === '.balance') return "📊 তোমার ব্যালেন্স: ০ TK";
      if (lower === '.buy') return "🛒 Packages:\n• 30 Days - 299 TK\n• 90 Days - 799 TK\n• Lifetime - 1999 TK";
      if (lower === '.recharge') return "💰 Recharge করতে bKash/Nagad নম্বর দাও";
      if (lower === '.support') return "🛠️ Support: Rocky Chowdhury এর সাথে কথা বলো";
      if (lower === '.reseller') return "🔥 Reseller হতে চাও? Username দাও";
      if (lower === '.help') return ".start .balance .buy .recharge .support .reseller .history .admin";
      if (lower === '.history') return "📜 History খালি এখনো";

      if (lower.includes('bby') || lower.includes('baby') || lower.includes('বেবি')) {
        return ["হ্যাঁ বেবি ❤️ কি চাও?", "বেবি ডাকলে মন ভরে যায় 😘", "আমার বেবি! 🚀 বলো কি লাগবে?"][Math.floor(Math.random()*3)];
      }
      if (lower.includes('bot')) {
        return "হ্যাঁ বস! ROCKY CHOWDHURY এর Income Bot তোমার জন্য রেডি 🔥";
      }

      // Human-like random replies
      const humanReplies = [
        "সুন্দর কথা! আরও বলো ❤️",
        "আমি তোমার সাথে আছি সবসময় 🚀",
        "আরেকটা মেসেজ দাও, আরও ভালো করে রিপ্লাই দিবো 😉",
        "ROCKY CHOWDHURY এর বট তোমার জন্য সবসময় অনলাইন",
        "মজা পেলাম! আবার বলো ভাই..."
      ];
      return humanReplies[Math.floor(Math.random() * humanReplies.length)];
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);

      setTimeout(() => {
        const reply = getBotReply(text);
        addMessage(reply, false);
        adminActivity.push({time: new Date().toLocaleTimeString('bn-BD'), action: text});
      }, 650);

      input.value = '';
    }

    function sendQuick(cmd) {
      addMessage(cmd, true);
      setTimeout(() => {
        addMessage(getBotReply(cmd), false);
        adminActivity.push({time: new Date().toLocaleTimeString('bn-BD'), action: cmd});
      }, 500);
    }

    function showAdminPanel() {
      const modal = document.getElementById('admin-modal');
      const content = document.getElementById('admin-log');
      let html = `<p class="text-emerald-400 mb-4">🔴 LIVE Activity • ROCKY CHOWDHURY</p>`;
      adminActivity.forEach(log => {
        html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3"><span class="text-xs text-zinc-400">\( {log.time}</span><br><b> \){log.action}</b></div>`;
      });
      content.innerHTML = html;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function hideAdminPanel() {
      document.getElementById('admin-modal').classList.add('hidden');
    }

    window.onload = () => {
      document.getElementById('chat-window').innerHTML = '';
      addMessage(`👑 ROCKY CHOWDHURY YOUR INCOME BOT READY!\n\nType .start or bby to talk like human`, false);
      adminActivity = [{time: "10:49 AM", action: "Bot Started"}];
    };
  </script>
</body>
</html>
