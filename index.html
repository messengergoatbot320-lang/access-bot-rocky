<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Premium Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{background:#f1f5f9;}
.header{background:linear-gradient(135deg,#ef4444,#f97316);}
.page{display:none;}
.show{display:block;}
.card{transition:.3s;}
.card:hover{transform:translateY(-3px);}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-2xl shadow w-80 text-center">
<h1 class="text-xl font-bold mb-4">Login Panel</h1>

<input id="user" placeholder="Enter Gmail" class="w-full border p-2 rounded mb-2">
<input id="pass" type="password" placeholder="Password" class="w-full border p-2 rounded mb-4">

<button onclick="login()" class="w-full bg-red-500 text-white py-2 rounded">Login</button>

<p class="text-xs mt-3">Use Gmail to login</p>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden flex">

<!-- Sidebar -->
<div class="w-64 bg-white h-screen shadow p-4">

<h1 class="font-bold text-lg mb-4">ROCKY PANEL</h1>

<div class="bg-blue-100 p-3 rounded-xl mb-4">
<p class="text-xs">Balance</p>
<h2 id="bal" class="text-2xl font-bold">0 ৳</h2>
</div>

<button onclick="addBalance()" class="w-full bg-green-500 text-white py-2 rounded mb-2">Recharge</button>
<button onclick="logout()" class="w-full bg-red-500 text-white py-2 rounded">Logout</button>

<div class="space-y-2 mt-4">
<div onclick="openPage('home')" class="p-3 bg-red-500 text-white rounded cursor-pointer">Home</div>
<div onclick="openPage('orders')" class="p-3 hover:bg-gray-100 rounded cursor-pointer">Orders</div>
</div>

</div>

<!-- CONTENT -->
<div class="flex-1">

<div class="header text-white p-4 flex justify-between">
<span>Dashboard</span>
<span id="topBal">0 ৳</span>
</div>

<!-- HOME -->
<div id="home" class="page show p-6">

<div class="grid grid-cols-4 gap-3">

<div onclick="order('Facebook')" class="card bg-blue-500 text-white p-4 rounded-xl text-center cursor-pointer">
<i class="fab fa-facebook text-2xl"></i>
<p>Facebook</p>
</div>

<div onclick="order('Instagram')" class="card bg-pink-500 text-white p-4 rounded-xl text-center cursor-pointer">
<i class="fab fa-instagram text-2xl"></i>
<p>Instagram</p>
</div>

<div onclick="order('YouTube')" class="card bg-red-500 text-white p-4 rounded-xl text-center cursor-pointer">
<i class="fab fa-youtube text-2xl"></i>
<p>YouTube</p>
</div>

<div onclick="order('TikTok')" class="card bg-black text-white p-4 rounded-xl text-center cursor-pointer">
<i class="fab fa-tiktok text-2xl"></i>
<p>TikTok</p>
</div>

</div>

</div>

<!-- ORDERS -->
<div id="orders" class="page p-6">
<h2 class="font-bold mb-3">My Orders</h2>
<div id="orderList"></div>
</div>

</div>
</div>

<script>

// AUTO LOGIN
if(localStorage.getItem("user")){
document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
}

// LOGIN
function login(){
let email=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(!email.includes("@gmail.com")){
alert("Enter valid Gmail!");
return;
}

if(pass.length<4){
alert("Password minimum 4 digit!");
return;
}

localStorage.setItem("user",email);
localStorage.setItem("pass",pass);

document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");

alert("Login Successful!");
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// BALANCE
let balance=localStorage.getItem("bal")||0;
updateBal();

function updateBal(){
document.getElementById("bal").innerText=balance+" ৳";
document.getElementById("topBal").innerText=balance+" ৳";
}

// ADD BALANCE
function addBalance(){
let amount=prompt("Enter amount:");
if(!amount)return;

balance=parseInt(balance)+parseInt(amount);
localStorage.setItem("bal",balance);
updateBal();
}

// ORDER
function order(name){
let qty=prompt("Enter Quantity:");
if(!qty)return;

let price=(qty/1000)*30;

if(balance<price){
alert("Not enough balance!");
return;
}

balance-=price;
localStorage.setItem("bal",balance);
updateBal();

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

orders.push({
name,qty,price,date:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("Order placed!");
loadOrders();
}

// LOAD ORDERS
function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
let html="";

orders.reverse().forEach(o=>{
html+=`
<div class="bg-white p-3 rounded-xl shadow mb-2">
<b>${o.name}</b><br>
Qty: ${o.qty}<br>
Price: ${o.price} ৳<br>
<small>${o.date}</small>
</div>
`;
});

document.getElementById("orderList").innerHTML=html;
}

// PAGE SWITCH
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

loadOrders();

</script>

</body>
</html>
