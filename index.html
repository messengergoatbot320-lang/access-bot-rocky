<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#f5f7ff;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.hero{
  text-align:center;
  padding:60px 20px;
}
.hero h1{
  font-size:40px;
}
.btn{
  padding:15px 25px;
  border:none;
  border-radius:10px;
  background:#ff2e4d;
  color:#fff;
  cursor:pointer;
}
.login-box{
  max-width:400px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

<div class="hero">
<h1>🚀 Rocky Social Panel</h1>
<p>Facebook, TikTok, YouTube services</p>
<button class="btn" onclick="scrollToLogin()">Get Started</button>
</div>

<div class="login-box" id="login">
<h2>Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<p id="msg"></p>
</div>

</div>

<script>
function scrollToLogin(){
  document.getElementById("login").scrollIntoView({behavior:"smooth"});
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="admin" && p=="1234"){
    document.getElementById("msg").innerHTML="✅ Login Successful!";
  } else {
    document.getElementById("msg").innerHTML="❌ Wrong Username or Password";
  }
}
</script>

</body>
</html>
