<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Premium Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;}
.header{background:linear-gradient(135deg,#ef4444,#f97316);}
.page{display:none;}
.show{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="h-screen flex items-center justify-center">
<div class="bg-white p-6 rounded-xl shadow w-80 text-center">
<h2 class="text-xl font-bold mb-4">Login Panel</h2>

<input id="user" placeholder="Enter Gmail" class="w-full border p-2 mb-2 rounded">
<input id="pass" type="password" placeholder="Password" class="w-full border p-2 mb-3 rounded">

<button onclick="login()" class="w-full bg-red-500 text-white py-2 rounded">Login</button>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden flex">

<!-- Sidebar -->
<div class="w-60 bg-white h-screen p-4 shadow">

<h1 class="font-bold mb-4">ROCKY PANEL</h1>

<div class="bg-blue-100 p-3 rounded mb-3">
<p>Balance</p>
<h2 id="bal">0 ৳</h2>
</div>

<button onclick="addBalance()" class="w-full bg-green-500 text-white py-2 rounded mb-2">Recharge</button>
<button onclick="logout()" class="w-full bg-red-500 text-white py-2 rounded">Logout</button>

<div class="mt-4">
<div onclick="openPage('home')" class="p-2 bg-red-500 text-white rounded mb-2">Home</div>
<div onclick="openPage('orders')" class="p-2 bg-gray-200 rounded">Orders</div>
</div>

</div>

<!-- CONTENT -->
<div class="flex-1">

<div class="header text-white p-3 flex justify-between">
<span>Dashboard</span>
<span id="topBal">0 ৳</span>
</div>

<!-- HOME -->
<div id="home" class="page show p-5">

<button onclick="order('Facebook')" class="bg-blue-500 text-white p-3 rounded w-full mb-2">Facebook Order</button>
<button onclick="order('YouTube')" class="bg-red-500 text-white p-3 rounded w-full mb-2">YouTube Order</button>

</div>

<!-- ORDERS -->
<div id="orders" class="page p-5">
<h2 class="font-bold mb-2">Orders</h2>
<div id="orderList"></div>
</div>

</div>
</div>

<script>

// INIT
let balance = parseInt(localStorage.getItem("bal")) || 0;
let user = localStorage.getItem("user");

// AUTO LOGIN FIX
if(user){
document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
}

// UPDATE BALANCE
function updateBal(){
document.getElementById("bal").innerText = balance + " ৳";
document.getElementById("topBal").innerText = balance + " ৳";
}
updateBal();

// LOGIN FIX
function login(){
let email = document.getElementById("user").value.trim();
let pass = document.getElementById("pass").value.trim();

if(!email || !pass){
alert("Fill all fields!");
return;
}

if(!email.includes("@gmail.com")){
alert("Enter valid Gmail!");
return;
}

if(pass.length < 4){
alert("Password must be 4+");
return;
}

// SAVE
localStorage.setItem("user", email);
localStorage.setItem("pass", pass);

location.reload(); // FIXED
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// ADD BALANCE
function addBalance(){
let amount = prompt("Enter amount:");
if(!amount || isNaN(amount)) return;

balance += parseInt(amount);
localStorage.setItem("bal", balance);
updateBal();
}

// ORDER
function order(name){
let qty = prompt("Quantity?");
if(!qty || isNaN(qty)) return;

let price = (qty/1000)*30;

if(balance < price){
alert("Not enough balance!");
return;
}

balance -= price;
localStorage.setItem("bal", balance);
updateBal();

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

orders.push({
name, qty, price, time: new Date().toLocaleString()
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order Success!");
loadOrders();
}

// LOAD ORDERS
function loadOrders(){
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

let html = "";

orders.reverse().forEach(o=>{
html += `
<div style="background:#fff;padding:10px;margin-bottom:8px;border-radius:8px;">
<b>${o.name}</b><br>
Qty: ${o.qty}<br>
Price: ${o.price} ৳<br>
<small>${o.time}</small>
</div>
`;
});

document.getElementById("orderList").innerHTML = html;
}

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

loadOrders();

</script>

</body>
</html>
