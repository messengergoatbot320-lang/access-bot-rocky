<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Premium Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;}
.header{background:linear-gradient(135deg,#ef4444,#f97316);}
.page{display:none;}
.show{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="h-screen flex items-center justify-center">
<div class="bg-white p-6 rounded-xl shadow w-80 text-center">

<h2 class="text-xl font-bold mb-4">Login</h2>

<input id="loginEmail" placeholder="Gmail" class="w-full border p-2 mb-2 rounded">
<input id="loginPass" type="password" placeholder="Password" class="w-full border p-2 mb-3 rounded">

<button onclick="login()" class="w-full bg-red-500 text-white py-2 rounded mb-2">Login</button>

<p class="text-sm">No account? <span onclick="showRegister()" class="text-blue-500 cursor-pointer">Register</span></p>

</div>
</div>

<!-- REGISTER -->
<div id="registerPage" class="hidden h-screen flex items-center justify-center">
<div class="bg-white p-6 rounded-xl shadow w-80 text-center">

<h2 class="text-xl font-bold mb-4">Register</h2>

<input id="regEmail" placeholder="Gmail" class="w-full border p-2 mb-2 rounded">
<input id="regPass" type="password" placeholder="Password" class="w-full border p-2 mb-3 rounded">

<button onclick="register()" class="w-full bg-green-500 text-white py-2 rounded mb-2">Register</button>

<p class="text-sm">Already have account? <span onclick="showLogin()" class="text-blue-500 cursor-pointer">Login</span></p>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden flex">

<div class="w-60 bg-white h-screen p-4 shadow">

<h1 class="font-bold mb-4">ROCKY PANEL</h1>

<div class="bg-blue-100 p-3 rounded mb-3">
<p>Balance</p>
<h2 id="bal">0 ৳</h2>
</div>

<button onclick="addBalance()" class="w-full bg-green-500 text-white py-2 rounded mb-2">Recharge</button>
<button onclick="logout()" class="w-full bg-red-500 text-white py-2 rounded">Logout</button>

</div>

<div class="flex-1">

<div class="header text-white p-3 flex justify-between">
<span>Dashboard</span>
<span id="topBal">0 ৳</span>
</div>

<div class="p-5">

<button onclick="order('Facebook')" class="bg-blue-500 text-white p-3 rounded w-full mb-2">Facebook Order</button>
<button onclick="order('YouTube')" class="bg-red-500 text-white p-3 rounded w-full mb-2">YouTube Order</button>

<h2 class="mt-4 font-bold">Orders</h2>
<div id="orderList"></div>

</div>

</div>
</div>

<script>

// DATABASE (LOCAL)
let users = JSON.parse(localStorage.getItem("users") || "{}");
let currentUser = localStorage.getItem("currentUser");

// AUTO LOGIN
if(currentUser){
showApp();
}

// SHOW PAGES
function showRegister(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin(){
document.getElementById("registerPage").classList.add("hidden");
document.getElementById("loginPage").classList.remove("hidden");
}

// REGISTER
function register(){
let email = document.getElementById("regEmail").value.trim();
let pass = document.getElementById("regPass").value.trim();

if(!email.includes("@gmail.com")){
alert("Enter valid Gmail!");
return;
}

if(pass.length < 4){
alert("Password 4+ required");
return;
}

if(users[email]){
alert("Account already exists!");
return;
}

// SAVE USER
users[email] = {
password: pass,
balance: 0,
orders: []
};

localStorage.setItem("users", JSON.stringify(users));

alert("Registration Success!");
showLogin();
}

// LOGIN
function login(){
let email = document.getElementById("loginEmail").value.trim();
let pass = document.getElementById("loginPass").value.trim();

if(!users[email] || users[email].password !== pass){
alert("Wrong login!");
return;
}

localStorage.setItem("currentUser", email);
showApp();
}

// SHOW APP
function showApp(){
document.getElementById("loginPage").style.display="none";
document.getElementById("registerPage").style.display="none";
document.getElementById("app").classList.remove("hidden");

loadData();
}

// LOGOUT
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

// LOAD USER DATA
function loadData(){
let user = users[currentUser];

document.getElementById("bal").innerText = user.balance + " ৳";
document.getElementById("topBal").innerText = user.balance + " ৳";

let html = "";

user.orders.reverse().forEach(o=>{
html += `
<div style="background:#fff;padding:10px;margin-top:5px;border-radius:8px;">
<b>${o.name}</b><br>
Qty: ${o.qty}<br>
Price: ${o.price} ৳
</div>`;
});

document.getElementById("orderList").innerHTML = html;
}

// ADD BALANCE
function addBalance(){
let amount = prompt("Enter amount:");
if(!amount || isNaN(amount)) return;

users[currentUser].balance += parseInt(amount);
localStorage.setItem("users", JSON.stringify(users));

loadData();
}

// ORDER
function order(name){
let qty = prompt("Quantity?");
if(!qty || isNaN(qty)) return;

let price = (qty/1000)*30;

if(users[currentUser].balance < price){
alert("Not enough balance!");
return;
}

users[currentUser].balance -= price;

users[currentUser].orders.push({
name, qty, price
});

localStorage.setItem("users", JSON.stringify(users));

alert("Order Success!");
loadData();
}

</script>

</body>
</html>
